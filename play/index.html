<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>OurSpace — Playable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@600;700&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2438; --ink-soft:#473e54; --muted:#8a8398; --line:#ece9f1;
    --bg:#efe9f3; --surface:#ffffff; --soft:#f6f4fa;
    --rose:#ff4d83; --rose-d:#d8336a; --rose-l:#fff1f6; --rose-bd:#ffd0e0;
    --ai:#7c5cff; --ai-d:#5b3be0; --ai-l:#f1ecff; --ai-bd:#ddd1ff;
    --ok:#11a06a; --warn:#d98300;
    --serif:"Noto Serif Thai",Georgia,serif;
    --sans:"Noto Sans Thai",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:var(--sans);color:var(--ink);
    background:#fdfbff;-webkit-font-smoothing:antialiased;overflow:hidden}
  body{height:100dvh;overflow:hidden}

  /* ===== device — mobile-first: fills the screen, locks safe area ===== */
  .device{position:relative;width:100vw;height:100dvh;background:#fdfbff;overflow:hidden}
  .scrn{position:relative;width:100%;height:100%;overflow:hidden;background:#fdfbff;display:flex;flex-direction:column}
  .island{display:none}
  .status{flex:0 0 auto;display:flex;align-items:flex-end;justify-content:space-between;
    padding:calc(8px + env(safe-area-inset-top)) 22px 5px;font-size:12px;font-weight:700;color:var(--ink);z-index:5}
  .status .rgt{display:flex;gap:5px;align-items:center;font-size:11px}

  /* screen viewport */
  .view{flex:1;position:relative;overflow:hidden}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;background:#fdfbff}
  .screen::-webkit-scrollbar{width:0}
  .screen.anim{animation:slideIn .34s cubic-bezier(.2,.7,.2,1)}
  .screen.back{animation:slideBack .34s cubic-bezier(.2,.7,.2,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  @keyframes slideBack{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}

  /* app bar */
  .ab{flex:0 0 auto;min-height:50px;display:flex;align-items:center;gap:10px;padding:8px 16px 10px;
    font-size:16px;font-weight:800;background:#fff;border-bottom:1px solid var(--line);z-index:4}
  .ab .bk{font-size:22px;cursor:pointer;color:var(--ink);margin-left:-4px;width:26px}
  .ab .r{margin-left:auto;font-weight:600;font-size:13px;color:var(--muted)}
  .ab.rose{background:linear-gradient(135deg,#ff7aa6,#ff4d83);color:#fff;border:0}
  .ab.rose .bk,.ab.rose .r{color:#fff}
  .ab.ai{background:linear-gradient(135deg,#9170ff,#6d3bff);color:#fff;border:0}
  .ab.ai .bk{color:#fff}

  .body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px}
  .body.center{align-items:center;text-align:center;justify-content:center;gap:14px}

  /* ui kit */
  .sec{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .h{font-family:var(--serif);font-weight:700;font-size:20px;line-height:1.25}
  .h2{font-weight:800;font-size:16px}
  .sub{font-size:13px;color:var(--muted);line-height:1.55}
  .emoji{font-size:48px;line-height:1}
  .big{font-family:var(--serif);font-weight:700;font-size:30px;color:var(--rose);line-height:1}
  .box{background:var(--soft);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    font-size:13.5px;color:var(--ink-soft);line-height:1.45}
  .box.sel{border-color:var(--rose);background:var(--rose-l);color:var(--rose-d);font-weight:700;box-shadow:0 0 0 3px rgba(255,77,131,.1)}
  .box .ttl{font-weight:800;color:var(--ink);font-size:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 6px 20px -12px rgba(60,25,70,.25)}
  .fld{background:#fff;border:1px solid var(--line);border-radius:13px;padding:9px 13px}
  .fld .l{font-size:11px;color:var(--muted);font-weight:700}
  .fld .v{font-size:15px;color:var(--ink);margin-top:1px;font-weight:600}
  .fld input{border:0;outline:0;font-family:var(--sans);font-size:15px;font-weight:600;color:var(--ink);width:100%;background:transparent;margin-top:1px;padding:0}
  .row{display:flex;gap:9px}.row>*{flex:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .btn{background:var(--rose);color:#fff;border:0;border-radius:14px;padding:14px;text-align:center;
    font-size:14px;font-weight:800;font-family:var(--sans);cursor:pointer;transition:.15s;width:100%;display:block}
  .btn:active{transform:scale(.98)}
  .btn.line{background:#fff;border:1.6px solid var(--rose);color:var(--rose)}
  .btn.ai{background:linear-gradient(135deg,#9170ff,#6d3bff)}
  .btn.ok{background:var(--ok)}
  .btn.ghost{background:#efecf4;color:var(--ink-soft)}
  .btn.sm{padding:10px;font-size:12.5px;border-radius:11px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .chip.on{background:var(--rose);color:#fff;border-color:var(--rose);font-weight:700}
  .chip.ai{background:var(--ai-l);border-color:var(--ai-bd);color:var(--ai-d);font-weight:700}
  .chip.ai.on{background:var(--ai);color:#fff}
  .slider{height:8px;background:linear-gradient(90deg,#ffd1df,var(--rose));border-radius:9px;position:relative;margin:8px 3px}
  .slider::after{content:"";position:absolute;left:55%;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#fff;border:3px solid var(--rose);border-radius:50%;box-shadow:0 3px 8px rgba(255,77,131,.4)}
  .spread{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .spacer{flex:1}
  .center-col{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
  .av{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#ffd9e8,#e7d9ff);display:flex;align-items:center;justify-content:center;font-size:28px;flex:0 0 auto}
  .pho{background:linear-gradient(135deg,#ffe0ec,#ece0ff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#c98}

  /* map */
  .map{flex:1;min-height:200px;border-radius:16px;position:relative;overflow:hidden;
    background:linear-gradient(0deg,#e3ede5 1px,transparent 1px) 0 0/100% 32px,
      linear-gradient(90deg,#e3ede5 1px,transparent 1px) 0 0/32px 100%,#eef6ef}
  .pin{position:absolute;font-size:24px;transform:translate(-50%,-100%);filter:drop-shadow(0 3px 3px rgba(0,0,0,.18))}
  .fab{position:absolute;right:16px;bottom:16px;width:54px;height:54px;border-radius:50%;background:var(--rose);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 10px 24px -6px rgba(255,77,131,.6);cursor:pointer;z-index:3}

  /* chat */
  .bub{max-width:78%;padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.4;word-wrap:break-word}
  .bub.me{background:var(--rose);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
  .bub.you{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px}
  .chatbar{flex:0 0 auto;display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--line);background:#fff}
  .chatbar input{flex:1;border:1px solid var(--line);border-radius:999px;padding:10px 15px;font-family:var(--sans);font-size:13.5px;outline:0}
  .chatbar .snd{width:42px;height:42px;border-radius:50%;background:var(--rose);color:#fff;border:0;font-size:18px;cursor:pointer;flex:0 0 auto}

  /* ai */
  .ai-card{background:var(--ai-l);border:1px solid var(--ai-bd);border-radius:14px;padding:12px;font-size:13px;color:#46357f;line-height:1.55}
  .ai-card .t{font-weight:800;color:var(--ai-d);display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .ai-card b{color:var(--ai-d)}
  .dots span{display:inline-block;width:7px;height:7px;background:var(--ai);border-radius:50%;margin:0 1px;animation:bnc 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes bnc{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

  /* receiver experience */
  .exp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;
    background:radial-gradient(125% 100% at 50% 0%,#ffe6f1,#f4ebff);position:relative;text-align:center}
  .exp .star{position:absolute;color:var(--rose);opacity:.5;font-size:13px;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:.9;transform:scale(1.3)}}
  .env{font-size:74px;animation:fl 4s ease-in-out infinite;filter:drop-shadow(0 8px 14px rgba(216,51,106,.25))}
  @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .lyr{background:rgba(255,255,255,.95);border:1px solid var(--rose-bd);border-radius:14px;padding:13px;font-size:13px;width:90%;box-shadow:0 8px 18px -10px rgba(216,51,106,.3)}
  .coupon{background:#fff;color:var(--rose-d);border:1.6px dashed var(--rose);border-radius:12px;padding:11px;font-size:13px;font-weight:700;text-align:center;width:90%}

  /* bottom nav */
  .bn{flex:0 0 auto;display:none;border-top:1px solid var(--line);background:rgba(255,255,255,.97);
    backdrop-filter:blur(8px);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  .device.tab .bn{display:flex}
  .bn a{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;padding:4px 0}
  .bn a .ic{font-size:21px;filter:grayscale(.4) opacity(.7)}
  .bn a.on{color:var(--rose)}
  .bn a.on .ic{filter:none}

  /* toast */
  .toast{position:absolute;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);
    background:rgba(40,30,50,.94);color:#fff;padding:11px 18px;border-radius:13px;font-size:13px;font-weight:600;
    opacity:0;transition:.3s;z-index:50;pointer-events:none;max-width:84%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* push banner */
  .pushwrap{position:absolute;top:calc(42px + env(safe-area-inset-top));left:0;right:0;z-index:55;display:flex;flex-direction:column;gap:8px;padding:0 12px;pointer-events:none}
  .push{background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:18px;padding:12px;display:flex;gap:11px;
    box-shadow:0 16px 34px -14px rgba(40,20,50,.4);pointer-events:auto;cursor:pointer;
    animation:drop .4s cubic-bezier(.2,.8,.2,1);text-align:left}
  @keyframes drop{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:none}}
  .push .pic{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--rose);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px}
  .push .ptx{font-size:12.5px;line-height:1.4;color:var(--ink)}
  .push .ptx b{font-weight:800}
  .push .ptx .pt{font-size:11px;color:var(--muted)}

  /* sheet (simulate / jump) */
  .sheetwrap{position:fixed;inset:0;background:rgba(30,15,40,.4);display:none;align-items:flex-end;justify-content:center;z-index:200}
  .sheetwrap.open{display:flex}
  .sheet{background:#fff;width:100%;max-width:412px;border-radius:24px 24px 0 0;padding:10px 16px 24px;animation:up .3s cubic-bezier(.2,.8,.2,1);max-height:80vh;overflow-y:auto}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .sheet .grab{width:40px;height:5px;border-radius:9px;background:#ddd;margin:6px auto 12px}
  .sheet h3{margin:0 0 4px;font-family:var(--serif);font-size:18px}
  .sheet .sd{font-size:12.5px;color:var(--muted);margin-bottom:12px}
  .simrow{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:14px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .simrow:active{background:var(--soft)}
  .simrow .se{font-size:22px}
  .simrow .st{font-weight:700;font-size:14px}
  .simrow .ss{font-size:11.5px;color:var(--muted)}
  .jumpgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .jumpgrid button{border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 8px;font-family:var(--sans);font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;text-align:left}
  .jumpgrid button:active{background:var(--soft)}

  /* demo toolbar */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
  .tbtn{border:0;background:#fff;color:var(--ink-soft);border-radius:999px;padding:9px 15px;font-family:var(--sans);
    font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px -8px rgba(60,25,70,.3);display:flex;align-items:center;gap:6px}
  .tbtn:active{transform:scale(.97)}
  .tbtn.on{background:var(--rose);color:#fff}
  .tbtn.sim{background:var(--rose);color:#fff}
  .credit{font-size:11px;color:#8a7e94;text-align:center}

  /* tap hint pulse */
  .hintmode [data-nav],.hintmode [data-act]{position:relative}
  .hintmode .btn[data-nav],.hintmode .btn[data-act],
  .hintmode .fab,.hintmode .box.sel[data-nav]{animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,131,.0)}50%{box-shadow:0 0 0 5px rgba(255,77,131,.35)}}

  /* demo button (mobile) — fixed to viewport edge so it's always visible */
  .demofab{position:fixed;right:8px;top:50%;transform:translateY(-50%);
    width:42px;height:42px;border-radius:50%;background:#2b2438;color:#fff;border:0;
    display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:300;
    box-shadow:0 8px 22px -6px rgba(0,0,0,.5);opacity:.92}

  /* default (phone): hide desktop toolbar/credit, show FAB */
  .toolbar,.credit{display:none}

  /* desktop / tablet: pretty framed device + visible toolbar below */
  @media (min-width:520px){
    html,body{background:radial-gradient(120% 90% at 50% 0%,#f7e3ee,#e7e0ee)}
    body{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:14px;overflow:hidden}
    .device{width:390px;height:min(844px,calc(100dvh - 96px));border-radius:48px;padding:11px;
      background:linear-gradient(165deg,#3a3340,#1b181f);box-shadow:0 40px 90px -30px rgba(60,25,70,.6),0 0 0 1px rgba(0,0,0,.05)}
    .scrn{border-radius:38px}
    .island{display:block;position:absolute;top:14px;left:50%;transform:translateX(-50%);width:96px;height:26px;background:#0a0810;border-radius:999px;z-index:60}
    .demofab{display:none}
    .toolbar{display:flex}
    .credit{display:block}
  }
</style>
</head>
<body>

<div class="device" id="device">
  <div class="island"></div>
  <div class="scrn">
    <div class="status"><span id="clock">21:09</span><span class="rgt">📶 🔋</span></div>
    <div class="pushwrap" id="pushwrap"></div>
    <div class="view"><div class="screen" id="screen"></div></div>
    <nav class="bn" id="bn"></nav>
    <div class="toast" id="toast"></div>
    <button class="demofab" data-tool="menu" aria-label="เครื่องมือ demo">🛠</button>
  </div>
</div>

<div class="toolbar">
  <button class="tbtn" data-tool="restart">⟲ Restart</button>
  <button class="tbtn sim" data-tool="simulate">🔔 จำลองเหตุการณ์</button>
  <button class="tbtn" data-tool="jump">☰ ไปหน้า</button>
  <button class="tbtn" data-tool="hints">👆 Tap hints</button>
</div>
<div class="credit">OurSpace · playable prototype — กดเล่นได้จริง · ▶ ปุ่มล่างช่วย demo</div>

<div class="sheetwrap" id="sheetwrap"><div class="sheet" id="sheet"></div></div>

<script>
/* ============ STATE ============ */
const LOVE=['💕','💞','💗','❤️','🥰','💑','💌','😍'];
const DEFAULT=()=>({
  nickMe:'ปุ้ย', nickPartner:'เบบี๋', meIcon:'🐰', partnerIcon:'🐻',
  days:412, anniv:23,
  places:[
    {name:'ทะเลหัวหิน',emoji:'🌊',tag:'ที่แรกที่ไปด้วยกัน',date:true,x:22,y:26},
    {name:'ร้านชาบู สาขาสยาม',emoji:'🍲',tag:'เดทครั้งที่ 3',date:true,x:64,y:48},
    {name:'คาเฟ่ในซอย',emoji:'☕',tag:'',date:false,x:40,y:66},
  ],
  diary:[
    {place:'ทะเลหัวหิน',date:'12 มิ.ย.',text:'ทริปแรกของเรา ❤️',ph:true},
    {place:'คาเฟ่ในซอย',date:'5 มิ.ย.',text:'กาแฟอร่อยมาก',ph:false},
  ],
  chat:[
    {who:'you',t:'คืนนี้กินไรดี~'},
    {who:'me',t:'ชาบูไหม 🥢'},
    {who:'you',t:'เอาๆ คิดถึงงง'},
  ],
  mood:{me:'🙂',you:'😀'},
  soo:{reason:'ลืมวันสำคัญ',tone:'จริงใจ',template:'เส้นทางความทรงจำ'},
  draftPlace:{name:'',cat:'เที่ยว'},
});
let S=DEFAULT();
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const lover=()=>rnd(LOVE);

/* ============ ENGINE ============ */
const screenEl=document.getElementById('screen');
const bnEl=document.getElementById('bn');
const deviceEl=document.getElementById('device');
let stack=['splash'];
const TAB_SCREENS=['home','chat','places','me'];
const TAB_OF={home:'home',chat:'chat',places:'places',me:'me'};

function nav(id,{back=false,replace=false}={}){
  if(replace) stack[stack.length-1]=id;
  else if(back){ if(stack.length>1) stack.pop(); }
  else stack.push(id);
  render(back);
}
function goBack(){ if(stack.length>1){stack.pop();render(true);} }
function cur(){ return stack[stack.length-1]; }

function render(back){
  const id=cur();
  const view=V[id]?V[id]():'<div class="body center"><div class="sub">— ยังไม่มีหน้านี้ —</div></div>';
  screenEl.innerHTML=view;
  screenEl.classList.remove('anim','back');void screenEl.offsetWidth;
  screenEl.classList.add(back?'back':'anim');
  // bottom nav
  const isTab=TAB_SCREENS.includes(id);
  deviceEl.classList.toggle('tab',isTab);
  if(isTab) renderNav(TAB_OF[id]);
  screenEl.scrollTop=0;
}
function renderNav(active){
  const tabs=[['home','🏠','หน้าหลัก'],['chat','💬','แชท'],['places','📍','สถานที่'],['me','👤','ฉัน']];
  bnEl.innerHTML=tabs.map(([id,ic,la])=>
    `<a data-nav="${id}" class="${id===active?'on':''}"><span class="ic">${ic}</span>${la}</a>`).join('');
}

/* delegated events */
document.addEventListener('click',e=>{
  const nv=e.target.closest('[data-nav]'); const ac=e.target.closest('[data-act]'); const bk=e.target.closest('[data-back]');
  const tl=e.target.closest('[data-tool]'); const jp=e.target.closest('[data-jump]'); const sm=e.target.closest('[data-sim]');
  if(bk){goBack();return;}
  if(tl){tool(tl.dataset.tool);return;}
  if(jp){closeSheet();stack=[jp.dataset.jump];render();return;}
  if(sm){closeSheet();simulate(sm.dataset.sim);return;}
  if(ac){ACT[ac.dataset.act]&&ACT[ac.dataset.act](e);return;}
  if(nv){nav(nv.dataset.nav);return;}
});

/* ============ helpers ============ */
function ab(title,{back=false,accent='',right=''}={}){
  return `<div class="ab ${accent}">${back?'<span class="bk" data-back>‹</span>':''}<span>${title}</span>${right?`<span class="r">${right}</span>`:''}</div>`;
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
function pushB({pic='💞',accent='rose',title,body,nav:to}){
  const w=document.getElementById('pushwrap');
  const el=document.createElement('div'); el.className='push';
  el.innerHTML=`<div class="pic" style="${accent==='ai'?'background:var(--ai)':''}">${pic}</div>
    <div class="ptx"><div class="pt">OurSpace · เดี๋ยวนี้</div>${title?`<b>${title}</b><br>`:''}${body}</div>`;

    <div class="coupon" style="border-color:var(--ai);color:var(--ai-d);width:100%">🍽️ จองโต๊ะร้านชาบู ส. นี้ 19:00</div>
    <div class="box">🎟️ แถมคูปอง: “ทำกับข้าวให้ 1 มื้อ”</div>
    <div class="sec">ส่งเมื่อไหร่</div>
    <div class="chips"><span class="chip on">ส่งเลย</span><span class="chip">ตั้งเวลา</span></div>
    <div class="spacer"></div>
    <button class="btn ai" data-act="sooSend">ส่งให้ ${S.nickPartner} 💌</button>
  </div>`;
V.sooSent=()=>ab('ส่งแล้ว 💌',{accent:'ai'})+`
  <div class="body center">
    <div class="emoji">💌</div><div class="h">ส่งประสบการณ์ง้อแล้ว!</div>
    <div class="sub">${S.nickPartner} จะได้รับการแจ้งเตือน<br>ลองดูว่าฝั่ง${S.nickPartner}เห็นอะไร</div>
    <div class="spacer"></div>
    <button class="btn ai" data-nav="recv1">▶ ดูต่อมุม${S.nickPartner} (คนรับ)</button>
    <button class="btn ghost" data-nav="home">กลับหน้าหลัก</button>
  </div>`;

/* ---- soo receiver ---- */
V.recv1=()=>`<div class="screen-inner">${ab('',{accent:''})}</div>
  <div class="exp">
    <span class="star" style="top:12%;left:14%">✦</span><span class="star" style="top:20%;right:16%;animation-delay:.6s">✦</span>

V.recv2=()=>`<div class="exp">

/* ============ ACTIONS ============ */
const ACT={
  saveNicks(){
    const p=document.getElementById('inP').value.trim()||'เบบี๋';
    const m=document.getElementById('inM').value.trim()||'ปุ้ย';
    S.nickPartner=p; S.nickMe=m; nav('ob2');
  },
  copyLink(){ toast('คัดลอกลิงก์เชิญแล้ว 🔗'); },
  paired(){ toast('จับคู่กับ '+S.nickPartner+' สำเร็จ 💞'); setTimeout(()=>{stack=['home'];render();},700); },
  poke(){ toast('แตะหา '+S.nickPartner+' แล้ว 👉'); },
  sendChat(){
    const inp=document.getElementById('chatin'); const t=(inp.value||'').trim(); if(!t)return;
    S.chat.push({who:'me',t});
    const body=document.getElementById('chatbody');
    body.insertAdjacentHTML('beforeend',`<div class="bub me">${esc(t)}</div>`);
    inp.value=''; body.scrollTop=body.scrollHeight;
    const replies=['คิดถึงเหมือนกันน้า 🥰','โอเครักๆ','555 ตลอดเลย','แล้วเจอกันนะ ❤️','จัาาา','เดี๋ยวกลับไปหานะ'];
    setTimeout(()=>{
      const r=rnd(replies); S.chat.push({who:'you',t:r});
      body.insertAdjacentHTML('beforeend',`<div class="bub you">${r}</div>`); body.scrollTop=body.scrollHeight;
    },900);
  },
  savePlace(){
    const nm=(document.getElementById('plName').value||'').trim()||'สถานที่ใหม่';
    const on=document.querySelector('#plCat .chip.on'); const cat=on?on.textContent:'เที่ยว';
    S.places.push({name:nm,emoji:'📍',tag:cat+' · เพิ่งเพิ่ม',date:true,x:30+Math.floor(Math.random()*40),y:30+Math.floor(Math.random()*40)});
    S.diary.unshift({place:nm,date:'วันนี้',text:'เพิ่งบันทึกความทรงจำใหม่ ❤️',ph:true});
    toast('เพิ่ม “'+nm+'” แล้ว 📍'); stack=['places']; render();
  },
  saveDate(){ S.anniv=Math.max(1,S.anniv); toast('ตั้งวันสำคัญ + เตือนแล้ว 🔔'); goBack(); },
  saveGeo(){ toast('บันทึกการแจ้งเตือนเข้าใกล้แล้ว 📡'); goBack(); },
  inviteAgain(){ toast('สร้างคำชวนเดทแล้ว 📅'); },
  editNick(){ stack.push('ob1'); render(); },
  sooSimple(){ toast('ส่งคำขอโทษแล้ว 🥺'); setTimeout(()=>{stack=['home'];render();},700); },
  sooAnalyze(){ nav('soo3'); setTimeout(()=>{ if(cur()==='soo3') nav('soo4'); },1800); },
  sooSend(){ nav('sooSent'); },
  sooForgive(){ nav('reconciled'); toast('คืนดีกันแล้ว 🎉'); },
  sooDefer(){ toast('ส่งว่า “ขอเวลาคิดแป๊บ” แล้ว 🕊️'); setTimeout(()=>{stack=['home'];render();},800); },
};
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* chip toggling (visual) */
document.addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  const wrap=c.parentElement;
  // single-select groups: those without multi
  if(wrap && !wrap.dataset.multi){ [...wrap.children].forEach(x=>x.classList.remove('on')); c.classList.add('on'); }
});

/* ============ SIMULATE ============ */
function simulate(type){
  if(type==='geofence'){
    pushB({pic:'💞',title:'OurSpace',body:`📍 คุณกำลังผ่านที่ที่เคยมาเดทกับ <b>${S.nickPartner}</b> ${lover()}<br><span class="pt">แวะรำลึกความหลังกันไหม?</span>`,nav:'placeMemory'});
    setTimeout(()=>pushB({pic:'💌',accent:'ai',title:'OurSpace',body:`💞 <b>${S.nickMe}</b> เพิ่งผ่านที่ที่เราเคยมาเดทกัน… <span class="pt">(นี่คือสิ่งที่${S.nickPartner}เห็น)</span>`}),1400);
  }else if(type==='soo'){
    pushB({pic:'💌',accent:'ai',title:'OurSpace',body:`💌 มีบางอย่างจาก ${S.nickMe}… อยากให้เปิดดูนะ`,nav:'recv1'});
  }else if(type==='poke'){
    pushB({pic:'👉',title:'OurSpace',body:`👉 <b>${S.nickPartner}</b> แตะหาคุณ — คิดถึงน้า ${lover()}`});
  }else if(type==='anniv'){
    pushB({pic:'🎂',title:'OurSpace',body:`🎂 อีก 3 วันครบรอบ 1 ปีแล้ว! เตรียมเซอร์ไพรส์ ${S.nickPartner} ไหม?`,nav:'dates'});
  }
}

/* ============ TOOLBAR / SHEETS ============ */
function tool(t){
  if(t==='menu'){ openSheet(demoSheet()); }
  else if(t==='restart'){ closeSheet(); S=DEFAULT(); stack=['splash']; render(); toast('เริ่มใหม่แล้ว ⟲'); }
  else if(t==='hints'){ closeSheet(); const on=document.body.classList.toggle('hintmode'); document.querySelectorAll('[data-tool="hints"]').forEach(b=>b.classList.toggle('on',on)); }
  else if(t==='simulate'){ openSheet(simSheet()); }
  else if(t==='jump'){ openSheet(jumpSheet()); }
}
function demoSheet(){
  return `<div class="grab"></div><h3>เครื่องมือ demo</h3><div class="sd">สำหรับเล่น / พรีเซนต์</div>
    <div class="jumpgrid">
      <button data-tool="simulate">🔔 จำลองเหตุการณ์</button>
      <button data-tool="jump">☰ ไปหน้า</button>
      <button data-tool="restart">⟲ Restart</button>
      <button data-tool="hints">👆 Tap hints</button>
    </div>`;
}
function simSheet(){
  const rows=[
    ['geofence','📍','เดินผ่านที่เคยเดท','เด้ง push 2 ฝั่ง (คนผ่าน + อีกฝ่าย)'],
    ['soo','💌',`${S.nickPartner} ส่งง้อมา`,'เปิดประสบการณ์ง้อฝั่งคนรับ'],
    ['poke','👉',`${S.nickPartner} แตะหา`,'push แตะหากัน'],
    ['anniv','🎂','ใกล้ครบรอบ','เตือนเตรียมเซอร์ไพรส์'],
  ];
  return `<div class="grab"></div><h3>จำลองเหตุการณ์</h3><div class="sd">เลือกเหตุการณ์เพื่อเด้ง push ในแอป (คุมเอง)</div>
    ${rows.map(([k,e,t,s])=>`<div class="simrow" data-sim="${k}"><div class="se">${e}</div><div><div class="st">${t}</div><div class="ss">${s}</div></div></div>`).join('')}`;
}
function jumpSheet(){
  const items=[
    ['splash','Splash'],['ob1','Onboarding'],['pair','จับคู่'],['home','Home'],['chat','แชท'],['places','สถานที่'],
    ['me','ฉัน'],['addp1','เพิ่มสถานที่'],['dates','วันสำคัญ'],['geo','ตั้งเตือนเข้าใกล้'],['soo1','ง้อ (AI)'],['recv1','มุมคนรับง้อ'],
  ];
  return `<div class="grab"></div><h3>กระโดดไปหน้า</h3><div class="sd">สำหรับ present — ข้ามไปหน้าจอไหนก็ได้</div>
    <div class="jumpgrid">${items.map(([k,la])=>`<button data-jump="${k}">${la}</button>`).join('')}</div>`;
}
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('sheetwrap').classList.add('open'); }
function closeSheet(){ document.getElementById('sheetwrap').classList.remove('open'); }
document.getElementById('sheetwrap').addEventListener('click',e=>{ if(e.target.id==='sheetwrap') closeSheet(); });

/* boot (supports #screen=home deep-link for demo/screenshot) */
(function(){ const m=(location.hash||'').match(/screen=([A-Za-z0-9]+)/); if(m&&V[m[1]]) stack=[m[1]]; })();
render();
</script>
</body>
